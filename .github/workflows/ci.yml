name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -timeout=120s

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # NOTE: golangci-lint releases lag new Go versions — its binaries are
      # built with the previous Go and can't parse a newer toolchain's code.
      # On Go 1.26 this job may fail until a 1.26-capable golangci-lint ships
      # (see golangci/golangci-lint#6272). If it does, pin `version:` to the
      # first 1.26-supporting release, or disable this job until then.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  docs:
    name: docs up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # tfplugindocs shells out to terraform to read the provider schema.
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Regenerate docs and check for drift
        run: |
          go generate ./...
          if [ -n "$(git status --porcelain docs/)" ]; then
            echo "docs/ is out of date — run 'make docs' and commit the result:"
            git --no-pager diff docs/
            exit 1
          fi
